version: 2

builds:
  - id: ty
    main: ./cmd/task
    binary: ty
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: taskd
    main: ./cmd/taskd
    binary: taskd
    # taskd is a daemon — no Windows build
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: ty
    builds:
      - ty
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "ty_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: taskd
    builds:
      - taskd
    format: tar.gz
    name_template: "taskd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^Merge"
