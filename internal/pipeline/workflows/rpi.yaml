name: rpi
description: Research → Plan → Implement, TaskYou-native (no HumanLayer). A phased, human-gated workflow that researches, designs, plans, then builds a change.
steps:
  # 1. research-questions — the ONLY phase that reads the raw goal. It turns the
  # goal into a neutral set of questions the research phase must answer, so
  # research can stay objective (blind to what the goal "wants" to build).
  - name: research-questions
    verbatim: true
    prompt: |
      You are the **research-questions** phase of the automated **rpi** workflow.

      ## Goal
      {{goal}}

      ## Your task
      Turn the goal above into a short, neutral list of questions that a
      codebase investigation must answer before anyone designs or plans a
      change. Stay objective: ask what needs to be understood, not what should
      be built. Cover, where relevant:
        - Which files, packages, functions, and data models are involved.
        - How the affected code works today, end to end.
        - What existing patterns, conventions, and tests already cover this area.
        - What constraints, invariants, and edge cases an implementation must
          respect.
        - What is explicitly out of scope.

      Do NOT propose solutions, designs, or recommendations here — only
      questions. Do NOT write any code. Do NOT commit anything to git.

      ## Handoff
      Save your questions document by calling `taskyou_set_artifact` with
      name `research-questions` and content set to your full markdown document.
      Then call `taskyou_complete`. Do not push to git; the artifact store is
      how this phase hands off.

  # 2. research — BLIND to the raw goal. It reads only the research-questions
  # artifact and answers those questions factually from the codebase. This is
  # the objectivity property of RPI: research reports what IS, uninfluenced by
  # what the goal wants.
  - name: research
    deps: [research-questions]
    verbatim: true
    prompt: |
      You are the **research** phase of the automated **rpi** workflow.

      ## Important: stay objective
      Do NOT look for or read the original goal/ticket. Work ONLY from the
      questions handed to you by the previous phase. Your job is to describe
      how the code actually works today — a factual report, no recommendations,
      no implementation suggestions, no "we should".

      ## Your task
      1. Read the questions by calling `taskyou_get_artifact` with name
         `research-questions`.
      2. Investigate the codebase to answer each question: read the relevant
         files fully, trace how the affected code works end to end, and note the
         patterns, conventions, tests, constraints, and edge cases you find.
      3. Write a concise, factual research document: which files/functions are
         involved (cite paths and, where useful, line numbers), how they fit
         together today, and the constraints an implementation must respect.
         Include a short "Open Questions" section for anything you could not
         determine. Do NOT include an implementation plan — that is a later
         phase.

      Do NOT write any code. Do NOT commit anything to git.

      ## Handoff
      Save your research by calling `taskyou_set_artifact` with name `research`
      and content set to your full markdown document. Then call
      `taskyou_complete`.

  # 3. design (GATE) — proposes an approach, weighs tradeoffs, recommends one.
  # A human reviews this before any outline/plan is built, because a wrong
  # approach here poisons everything downstream. Parks 'blocked' after finishing;
  # release it with `ty close <id>`.
  - name: design
    deps: [research]
    gate: true
    verbatim: true
    prompt: |
      You are the **design** phase of the automated **rpi** workflow. This is a
      human-reviewed gate: when you finish, the workflow parks for a human to
      approve your approach before planning proceeds.

      ## Goal
      {{goal}}

      ## Your task
      1. Read the research by calling `taskyou_get_artifact` with name
         `research`.
      2. Propose how to accomplish the goal grounded in that research. Lay out
         the design: the shape of the change, the key components/interfaces that
         change or get added, and how they fit the existing patterns the
         research found.
      3. Where there is a meaningful choice, present the realistic options with
         their tradeoffs and make a clear recommendation. Call out risks, edge
         cases, and anything explicitly out of scope.
      4. End with a short "Open Questions" section listing anything a human
         reviewer should decide.

      Do NOT write any code. Do NOT commit anything to git.

      ## Handoff
      Save your design by calling `taskyou_set_artifact` with name `design`
      and content set to your full markdown document. Then call
      `taskyou_complete`. Because this is a gate, the workflow then parks in
      'blocked' for human review — a human approves with `ty close <id>` to
      release the next phase.

  # 4. structure-outline — turns the approved design into a phased,
  # vertical-slice outline: what changes in each file, in what order, and how
  # each phase is verified.
  - name: structure-outline
    deps: [design]
    verbatim: true
    prompt: |
      You are the **structure-outline** phase of the automated **rpi** workflow.

      ## Goal
      {{goal}}

      ## Your task
      1. Read the approved design by calling `taskyou_get_artifact` with name
         `design`.
      2. Produce a phased structure outline that breaks the work into small,
         independently verifiable vertical slices. For each phase describe:
           - the concrete file changes (which files, which functions/types, and
             the intent of each change — signatures and shape, not full diffs);
           - a "Validation" section with automated checks (build/test commands)
             and any manual verification, written as checkboxes.
      3. Order phases so each one leaves the tree building and testable. Keep the
         outline faithful to the approved design.

      Do NOT write any code. Do NOT commit anything to git.

      ## Handoff
      Save your outline by calling `taskyou_set_artifact` with name
      `structure-outline` and content set to your full markdown document. Then
      call `taskyou_complete`.

  # 5. plan (GATE) — turns the outline into a precise, diff-level plan with
  # per-phase success criteria. Human-reviewed before any code is written,
  # because this is the last cheap point to catch a wrong plan.
  - name: plan
    deps: [structure-outline]
    gate: true
    verbatim: true
    prompt: |
      You are the **plan** phase of the automated **rpi** workflow. This is a
      human-reviewed gate: when you finish, the workflow parks for a human to
      approve the plan before implementation proceeds.

      ## Goal
      {{goal}}

      ## Your task
      1. Read the outline by calling `taskyou_get_artifact` with name
         `structure-outline` (and, if useful, `design` and `research`).
      2. Produce a precise implementation plan: for each phase, the exact
         changes to make (files, functions, and the specific edits — enough that
         an implementer can follow it without re-deciding the approach), and
         explicit per-phase success criteria (the automated commands to run and
         what "done" looks like).
      3. Flag any remaining ambiguities a human should resolve before coding.

      Do NOT write any code. Do NOT commit anything to git.

      ## Handoff
      Save your plan by calling `taskyou_set_artifact` with name `plan` and
      content set to your full markdown document. Then call `taskyou_complete`.
      Because this is a gate, the workflow then parks in 'blocked' for human
      review — a human approves with `ty close <id>` to release implementation.

  # 6. implement — the first phase that touches code. It reads the approved plan
  # and executes it, committing and pushing on the shared branch. Uses a plain
  # prompt (not verbatim) so the DAG-derived git handoff is composed onto it.
  - name: implement
    deps: [plan]
    prompt: |
      Read the approved implementation plan by calling `taskyou_get_artifact`
      with name `plan` (and read `structure-outline`, `design`, or `research`
      via the same tool if you need more context).

      Implement the plan phase by phase. After each phase, run the automated
      verification the plan specifies (build/tests) and fix what breaks before
      moving on. Follow the existing patterns the research identified; keep the
      change focused on the goal. Do NOT open a pull request — the next phase
      does that.

  # 7. describe-pr — the terminal/sink step. It opens the PR and the workflow
  # parks in 'blocked' for a human to merge. Plain prompt so the DAG-derived PR
  # handoff is composed onto it.
  - name: describe-pr
    deps: [implement]
    prompt: |
      The implementation is committed on the shared branch. Write a clear pull
      request: a title that summarizes the change and a body covering what
      changed and why, how it was verified, and anything a reviewer should look
      at closely. For context you may read the `plan` and `structure-outline`
      artifacts via `taskyou_get_artifact`. Then open the pull request.
