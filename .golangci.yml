version: "2"
linters:
  enable:
    - gosec
    - misspell
    - bodyclose
    - unconvert
    - errname
  disable:
    - errcheck
  settings:
    staticcheck:
      checks:
        - all
        - -QF1003
        - -QF1008
        - -S1017
        - -SA9003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters: [gosec]
        text: "G204:"
      - linters: [gosec]
        text: "G115:"
      - linters: [gosec]
        text: "G306:"
      - linters: [staticcheck]
        text: "SA5011"
        path: "_test\\.go"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/bborn/workflow
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
