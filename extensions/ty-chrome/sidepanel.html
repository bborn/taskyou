<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header>
    <span id="status-dot" class="dot"></span>
    <h1>TaskYou</h1>
    <button id="settings-btn" title="Server settings">⚙</button>
  </header>

  <div id="settings" class="card hidden">
    <label for="server-url">ty serve URL</label>
    <input id="server-url" type="text" placeholder="http://127.0.0.1:8080" />
    <small>Press Enter to save. Auto-detected when <code>ty serve</code> is running on a common port.</small>
  </div>

  <div id="task-card" class="card">
    <div id="task-match" class="hidden">
      <div class="task-line">
        <span id="task-id" class="task-id"></span>
        <span id="task-title"></span>
      </div>
      <div class="task-sub">
        <span id="task-status" class="pill"></span>
        <span id="task-port" class="mono"></span>
        <span id="task-branch" class="mono"></span>
      </div>
    </div>
    <div id="task-picker" class="hidden">
      <p class="muted">No task matches this tab's port.</p>
      <div class="picker-row">
        <select id="task-select"></select>
        <button id="refresh-tasks" title="Refresh">↻</button>
      </div>
    </div>
    <p id="no-connection" class="muted hidden">Can't reach ty serve. Check the URL in ⚙ and that <code>ty serve</code> is running.</p>
  </div>

  <div class="card">
    <button id="annotate-btn" class="primary">✏️ Annotate this page</button>
    <div class="annotate-sub">
      <span id="annotation-count" class="muted">0 annotations pinned</span>
    </div>
    <textarea id="instruction" placeholder="Overall instruction for the executor (optional)"></textarea>
    <button id="send-btn" class="primary">Send annotations →</button>
    <p id="send-result" class="muted"></p>
  </div>

  <div class="card executor">
    <div class="executor-head">
      <h2>Executor</h2>
      <span id="executor-state" class="muted"></span>
    </div>
    <pre id="console"></pre>
    <!-- Executor is read-only for now; unhide to re-enable follow-up input -->
    <div class="input-row hidden">
      <input id="followup" type="text" placeholder="Say something to the executor…" />
      <button id="followup-send">↵</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
